name: Release build

# Builds the public, downloadable app artifacts and attaches them to a GitHub
# Release:
#   * RunTiyul.apk       - Android install package (sideload / adb install)
#   * RunTiyul.ipa       - unsigned iOS app bundle (sideload via AltStore/Sideloadly)
#
# The landing page links to these assets through the stable "latest release"
# URLs, so the names must not change:
#   https://github.com/<owner>/<repo>/releases/latest/download/RunTiyul.apk
#   https://github.com/<owner>/<repo>/releases/latest/download/RunTiyul.ipa
#
# Trigger a release by pushing a semver tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# or run this workflow manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.0.0). Required for manual runs.'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub Release as a pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_CHANNEL: stable

jobs:
  # ---------------------------------------------------------------------------
  # Android APK
  # ---------------------------------------------------------------------------
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/RunTiyul.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtiyul-apk
          path: dist/RunTiyul.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # iOS (unsigned .ipa)
  # ---------------------------------------------------------------------------
  ios:
    name: Build iOS (unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS app without code signing
        run: flutter build ios --release --no-codesign

      - name: Package unsigned .ipa
        run: |
          set -euo pipefail
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected app bundle not found at $APP_PATH"
            exit 1
          fi
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          (cd dist && zip -qry RunTiyul.ipa Payload && rm -rf Payload)
          ls -lh dist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtiyul-ipa
          path: dist/RunTiyul.ipa
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish GitHub Release with both artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [android, ios]
    # Publish as long as the Android APK built. The unsigned iOS build runs on a
    # macOS runner and is best-effort: if it fails we still ship the APK (the
    # site's primary download) and attach the IPA only when it is available.
    if: ${{ always() && needs.android.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          cp artifacts/runtiyul-apk/RunTiyul.apk release/RunTiyul.apk
          if [ -f artifacts/runtiyul-ipa/RunTiyul.ipa ]; then
            cp artifacts/runtiyul-ipa/RunTiyul.ipa release/RunTiyul.ipa
          else
            echo "::warning::iOS IPA unavailable; publishing Android APK only."
          fi
          ls -lh release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: RunTiyul ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          fail_on_unmatched_files: false
          body: |
            ## RunTiyul ${{ steps.tag.outputs.value }}

            Offline-first trail running: offline maps, GPX routes, GPS recording, and on-route navigation.

            ### Downloads
            | Platform | File | Notes |
            | --- | --- | --- |
            | Android | `RunTiyul.apk` | Enable "install unknown apps", then open the file (or `adb install RunTiyul.apk`). |
            | iOS | `RunTiyul.ipa` | **Unsigned** build. Sideload with [AltStore](https://altstore.io/) or [Sideloadly](https://sideloadly.io/). Not distributed via the App Store. |

            See the [website](https://nachem.github.io/RunTiyul/) for full install instructions.
          files: |
            release/RunTiyul.apk
            release/RunTiyul.ipa
