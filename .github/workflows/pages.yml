name: Deploy website

# Publishes the marketing/landing site in `site/` to GitHub Pages.
#
# One-time setup (repository owner):
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
#
# After that, every push to `main` that touches `site/` (or a manual run)
# redeploys https://<owner>.github.io/<repo>/.

on:
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; never cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
